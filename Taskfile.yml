version: "3"

tasks:
  default:
    cmds:
      - task -l

  build:
    desc: Build the native CLI executable
    deps: [fmt]
    cmds: [zig build]

  build:llama:
    desc: Build with native llama.cpp FFI
    deps: [fmt]
    cmds: [zig build -Dllama]

  test:
    desc: Run all tests
    cmds: [zig build test]

  test:llama:
    desc: Run all tests with native llama.cpp
    cmds: [zig build test -Dllama]

  test:mcp:
    desc: Run MCP-related tests
    cmds: [zig build test -- --test-filter mcp]

  test:mcp:framed:
    desc: Run framed MCP transport tests
    cmds: [zig build test -- --test-filter framed]

  fmt:
    desc: Format Zig code
    cmds: [zig fmt .]

  run:
    desc: Build and run the CLI
    cmds: ["zig build run -- {{.CLI_ARGS}}"]

  check:
    desc: Check format and run tests
    cmds:
      - zig fmt --check .
      - zig build test

  check:mcp:
    desc: Check format and run MCP tests
    cmds:
      - zig fmt --check .
      - zig build test -- --test-filter mcp

  e2e:
    desc: E2E test (FTS + FNV fallback)
    deps: [build]
    cmds: [./scripts/e2e.sh]

  e2e:real:
    desc: E2E test with real subprocess embedding model
    deps: [build]
    cmds: [./scripts/e2e-real.sh]

  e2e:llama:
    desc: E2E test with dual GGUF models (embed + generation)
    deps: [build:llama]
    cmds: [./scripts/e2e-llama.sh]

  e2e:llama:embed-only:
    desc: E2E test with embed model only
    deps: [build:llama]
    cmds: [./scripts/e2e-llama-embed-only.sh]

  install:
    desc: Build and install zmd to ~/bin/
    deps: [build]
    cmds:
      - mkdir -p ~/bin
      - cp zig-out/bin/zmd ~/bin/zmd
      - echo "Installed zmd to ~/bin/zmd"

  install:llama:
    desc: Build with llama and install zmd to ~/bin/
    deps: [build:llama]
    cmds:
      - mkdir -p ~/bin
      - cp zig-out/bin/zmd ~/bin/zmd
      - echo "Installed zmd (llama) to ~/bin/zmd"

  clean:
    desc: Clean build artifacts
    cmds: [rm -rf .zig-cache zig-out]

  cross:linux:
    desc: Cross-compile for linux x86_64
    cmds: [zig build -Dtarget=x86_64-linux]

  cross:mac:
    desc: Cross-compile for macOS aarch64
    cmds: [zig build -Dtarget=aarch64-macos]

  cross:windows:
    desc: Cross-compile for windows x86_64
    cmds: [zig build -Dtarget=x86_64-windows]

  cross:
    desc: Cross-compile all release targets
    cmds:
      - task cross:linux
      - task cross:mac
      - task cross:windows

  loc:
    desc: Count lines of code
    cmds: [tokei]

  version:
    desc: Show current version
    silent: true
    cmds: [cat VERSION]

  version:patch:
    desc: Bump patch version
    cmds: [./scripts/version-bump.sh patch]

  version:minor:
    desc: Bump minor version
    cmds: [./scripts/version-bump.sh minor]

  version:major:
    desc: Bump major version
    cmds: [./scripts/version-bump.sh major]
